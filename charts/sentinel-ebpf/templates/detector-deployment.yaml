{{- if .Values.detector.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sentinel-ebpf.fullname" . }}-detector
  labels:
    {{- include "sentinel-ebpf.labels" . | nindent 4 }}
    app.kubernetes.io/component: detector
spec:
  replicas: {{ if .Values.detector.autoscaling.enabled }}{{ .Values.detector.autoscaling.minReplicas }}{{ else }}1{{ end }}
  selector:
    matchLabels:
      {{- include "sentinel-ebpf.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: detector
  template:
    metadata:
      labels:
        {{- include "sentinel-ebpf.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: detector
      annotations:
        {{- toYaml .Values.detector.podAnnotations | nindent 8 }}
    spec:
      {{- if .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: detector
          image: "{{ .Values.detector.image.repository }}:{{ .Values.detector.image.tag }}"
          imagePullPolicy: {{ .Values.detector.image.pullPolicy }}
          env:
            - name: DETECTOR_RULES_PATH
              value: /etc/sentinel-ebpf/rules.yaml
            - name: DETECTOR_PORT
              value: "{{ .Values.detector.service.port }}"
            - name: DETECTOR_EVENTS_PORT
              value: "{{ .Values.detector.eventsPort }}"
            - name: DETECTOR_MODEL_ALGORITHM
              value: {{ .Values.detector.model.algorithm | quote }}
            - name: DETECTOR_THRESHOLD
              value: {{ .Values.detector.model.threshold | quote }}
            - name: DETECTOR_SCORE_MODE
              value: {{ .Values.detector.model.score_mode | quote }}
            - name: DETECTOR_WARMUP_EVENTS
              value: {{ .Values.detector.model.warmup.events | default 0 | quote }}
            - name: DETECTOR_SUPPRESS_ANOMALIES_DURING_WARMUP
              value: {{ .Values.detector.model.warmup.suppress_anomalies | default false | quote }}
            - name: DETECTOR_PERCENTILE_WINDOW_SIZE
              value: {{ .Values.detector.model.percentile.window_size | default 2048 | quote }}
            - name: DETECTOR_PERCENTILE_WARMUP
              value: {{ .Values.detector.model.percentile.warmup | default 128 | quote }}
            - name: DETECTOR_HST_N_TREES
              value: {{ .Values.detector.model.hst_n_trees | quote }}
            - name: DETECTOR_HST_HEIGHT
              value: {{ .Values.detector.model.hst_height | quote }}
            - name: DETECTOR_HST_WINDOW_SIZE
              value: {{ .Values.detector.model.hst_window_size | quote }}
            - name: DETECTOR_LODA_PROJECTIONS
              value: {{ .Values.detector.model.loda_n_projections | quote }}
            - name: DETECTOR_LODA_BINS
              value: {{ .Values.detector.model.loda_bins | quote }}
            - name: DETECTOR_LODA_RANGE
              value: {{ .Values.detector.model.loda_range | quote }}
            - name: DETECTOR_LODA_EMA_ALPHA
              value: {{ .Values.detector.model.loda_ema_alpha | quote }}
            - name: DETECTOR_LODA_HIST_DECAY
              value: {{ .Values.detector.model.loda_hist_decay | quote }}
            - name: DETECTOR_MEMSTREAM_MEMORY_SIZE
              value: {{ .Values.detector.model.mem_memory_size | quote }}
            - name: DETECTOR_MEMSTREAM_LR
              value: {{ .Values.detector.model.mem_lr | quote }}
            - name: DETECTOR_MEMSTREAM_BETA
              value: {{ .Values.detector.model.mem_beta | quote }}
            - name: DETECTOR_MEMSTREAM_K
              value: {{ .Values.detector.model.mem_k | quote }}
            - name: DETECTOR_MEMSTREAM_GAMMA
              value: {{ .Values.detector.model.mem_gamma | quote }}
            - name: DETECTOR_MEMSTREAM_WARMUP_ACCEPT
              value: {{ .Values.detector.model.mem_warmup_accept | quote }}
            - name: DETECTOR_ZSCORE_MIN_COUNT
              value: {{ .Values.detector.model.zscore_min_count | quote }}
            - name: DETECTOR_ZSCORE_STD_FLOOR
              value: {{ .Values.detector.model.zscore_std_floor | quote }}
            - name: DETECTOR_ZSCORE_TOPK
              value: {{ .Values.detector.model.zscore_topk | quote }}
            - name: DETECTOR_FREQ1D_BINS
              value: {{ .Values.detector.model.freq1d_bins | quote }}
            - name: DETECTOR_FREQ1D_ALPHA
              value: {{ .Values.detector.model.freq1d_alpha | quote }}
            - name: DETECTOR_FREQ1D_DECAY
              value: {{ .Values.detector.model.freq1d_decay | quote }}
            - name: DETECTOR_FREQ1D_MAX_CATEGORIES
              value: {{ .Values.detector.model.freq1d_max_categories | quote }}
            - name: DETECTOR_FREQ1D_AGGREGATION
              value: {{ .Values.detector.model.freq1d_aggregation | quote }}
            - name: DETECTOR_FREQ1D_TOPK
              value: {{ .Values.detector.model.freq1d_topk | quote }}
            - name: DETECTOR_FREQ1D_SOFT_TOPK_TEMPERATURE
              value: {{ .Values.detector.model.freq1d_soft_topk_temperature | quote }}
            - name: DETECTOR_COPULATREE_U_CLAMP
              value: {{ .Values.detector.model.copulatree_u_clamp | quote }}
            - name: DETECTOR_COPULATREE_REG
              value: {{ .Values.detector.model.copulatree_reg | quote }}
            - name: DETECTOR_COPULATREE_MAX_FEATURES
              value: {{ .Values.detector.model.copulatree_max_features | quote }}
            - name: DETECTOR_COPULATREE_IMPORTANCE_WINDOW
              value: {{ .Values.detector.model.copulatree_importance_window | quote }}
            - name: DETECTOR_COPULATREE_TREE_UPDATE_INTERVAL
              value: {{ .Values.detector.model.copulatree_tree_update_interval | quote }}
            - name: DETECTOR_COPULATREE_EDGE_SCORE_AGGREGATION
              value: {{ .Values.detector.model.copulatree_edge_score_aggregation | quote }}
            - name: DETECTOR_COPULATREE_EDGE_SCORE_TOPK
              value: {{ .Values.detector.model.copulatree_edge_score_topk | quote }}
            - name: DETECTOR_LATENTCLUSTER_MAX_CLUSTERS
              value: {{ .Values.detector.model.latentcluster_max_clusters | quote }}
            - name: DETECTOR_LATENTCLUSTER_U_CLAMP
              value: {{ .Values.detector.model.latentcluster_u_clamp | quote }}
            - name: DETECTOR_LATENTCLUSTER_REG
              value: {{ .Values.detector.model.latentcluster_reg | quote }}
            - name: DETECTOR_LATENTCLUSTER_UPDATE_ALPHA
              value: {{ .Values.detector.model.latentcluster_update_alpha | quote }}
            - name: DETECTOR_LATENTCLUSTER_SPAWN_THRESHOLD
              value: {{ .Values.detector.model.latentcluster_spawn_threshold | quote }}
            - name: DETECTOR_KITNET_MAX_SIZE_AE
              value: {{ .Values.detector.model.kitnet_max_size_ae | quote }}
            - name: DETECTOR_KITNET_GRACE_FEATURE_MAPPING
              value: {{ .Values.detector.model.kitnet_grace_feature_mapping | quote }}
            - name: DETECTOR_KITNET_GRACE_ANOMALY_DETECTOR
              value: {{ .Values.detector.model.kitnet_grace_anomaly_detector | quote }}
            - name: DETECTOR_KITNET_LEARNING_RATE
              value: {{ .Values.detector.model.kitnet_learning_rate | quote }}
            - name: DETECTOR_KITNET_HIDDEN_RATIO
              value: {{ .Values.detector.model.kitnet_hidden_ratio | quote }}
            - name: DETECTOR_MODEL_SEED
              value: {{ .Values.detector.model.seed | quote }}
            - name: DETECTOR_EMBEDDING_WORD2VEC_DIM
              value: {{ .Values.detector.model.embeddings.word2vec.dim | default 5 | quote }}
            - name: DETECTOR_EMBEDDING_WORD2VEC_SENTENCE_LEN
              value: {{ .Values.detector.model.embeddings.word2vec.sentence_len | default 7 | quote }}
            - name: DETECTOR_EMBEDDING_WORD2VEC_WINDOW
              value: {{ .Values.detector.model.embeddings.word2vec.window | default 5 | quote }}
            - name: DETECTOR_EMBEDDING_WORD2VEC_SG
              value: {{ .Values.detector.model.embeddings.word2vec.sg | default 1 | quote }}
            - name: DETECTOR_EMBEDDING_WORD2VEC_UPDATE_EVERY
              value: {{ .Values.detector.model.embeddings.word2vec.update_every | default 25 | quote }}
            - name: DETECTOR_EMBEDDING_WORD2VEC_EPOCHS
              value: {{ .Values.detector.model.embeddings.word2vec.epochs | default 1 | quote }}
            - name: DETECTOR_EMBEDDING_WORD2VEC_POST_WARMUP_LR_SCALE
              value: {{ .Values.detector.model.embeddings.word2vec.post_warmup_lr_scale | default 0.1 | quote }}
            - name: DETECTOR_SEQUENCE_NGRAM_LENGTH
              value: {{ .Values.detector.model.sequence_ngram_length | default 8 | quote }}
            - name: DETECTOR_SEQUENCE_THREAD_AWARE
              value: {{ .Values.detector.model.sequence_thread_aware | default true | quote }}
            - name: DETECTOR_SEQUENCE_MLP_HIDDEN_SIZE
              value: {{ .Values.detector.model.sequence_mlp_hidden_size | default 150 | quote }}
            - name: DETECTOR_SEQUENCE_MLP_HIDDEN_LAYERS
              value: {{ .Values.detector.model.sequence_mlp_hidden_layers | default 4 | quote }}
            - name: DETECTOR_SEQUENCE_MLP_LR
              value: {{ .Values.detector.model.sequence_mlp_lr | default 0.003 | quote }}
            {{- if .Values.detector.recentEventsBufferSize }}
            - name: DETECTOR_RECENT_EVENTS_BUFFER_SIZE
              value: {{ .Values.detector.recentEventsBufferSize | quote }}
            {{- end }}
            {{- if .Values.detector.anomalyLogPath }}
            - name: ANOMALY_LOG_PATH
              value: {{ .Values.detector.anomalyLogPath | quote }}
            {{- end }}
            {{- if .Values.detector.eventDumpPath }}
            - name: EVENT_DUMP_PATH
              value: {{ .Values.detector.eventDumpPath | quote }}
            {{- end }}
          volumeMounts:
            - name: rules
              mountPath: /etc/sentinel-ebpf/rules.yaml
              subPath: rules.yaml
          ports:
            - containerPort: {{ .Values.detector.service.port }}
              name: grpc
            - containerPort: {{ .Values.detector.eventsPort }}
              name: events
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: grpc
            # Detector does model init (e.g. halfspacetrees) before binding; give time before first check
            initialDelaySeconds: 15
            periodSeconds: 5
          resources:
            {{- toYaml .Values.detector.resources | nindent 12 }}
      volumes:
        - name: rules
          configMap:
            name: {{ include "sentinel-ebpf.fullname" . }}-config
      nodeSelector:
        {{- toYaml .Values.detector.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.detector.tolerations | nindent 8 }}
      affinity:
        {{- toYaml .Values.detector.affinity | nindent 8 }}
{{- end }}
