global:
  imagePullSecrets: []

probe:
  clusterName: ""
  image:
    repository: ghcr.io/shepherd-itsec/sentinel-ebpf-probe
    tag: "latest"
    pullPolicy: IfNotPresent
  grpc:
    # Default: use detector service name from release (fullname-detector:port). Override if needed.
    endpoint: ""
    tls:
      enabled: false
      caSecret: ""
  stream:
    mode: grpc # grpc | stdout | file
    batchSize: 512 
    queueLength: 50000
    ringBufferPages: 256
    file:
      path: /var/log/sentinel-ebpf/events.bin
      rotateMaxBytes: 52428800
      rotateMaxFiles: 3
      compress: false
  storage:
    pvc:
      enabled: false
      size: 1Gi
      storageClassName: ""
      accessModes: ["ReadWriteOnce"]
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  securityContext:
    privileged: true
    runAsUser: 0
    runAsGroup: 0
    capabilities:
      add: ["SYS_ADMIN", "SYS_RESOURCE", "SYS_PTRACE"]
  serviceAccount:
    create: true
    name: ""
    annotations: {}
  rbac:
    create: true

detector:
  enabled: true
  image:
    repository: ghcr.io/shepherd-itsec/sentinel-ebpf-detector
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 50051
  eventsPort: 50052  # HTTP API for recent events (UI log tail in gRPC mode)
  anomalyLogPath: ""  # Path to log anomalies to file (empty to disable, e.g., /var/log/sentinel-ebpf/anomalies.jsonl)
  eventDumpPath: "/var/log/sentinel-ebpf/events.jsonl"   # Path to dump all incoming events to file (empty to disable, e.g., /var/log/sentinel-ebpf/events.jsonl)
  # Model configurations
  model:
    algorithm: "latentcluster"  # halfspacetrees | loda | loda_ema | memstream | kitnet | zscore | freq1d | gausscop | copulatree | latentcluster
    feature_encoding: "encoded"  # hash (legacy scalar hashes) | encoded (event one-hot, bucket banks, path tokens)
    threshold: 0.7  # Anomaly score threshold (0-1)
    score_mode: "scaled"  # raw | scaled | percentile (percentile = per-event_type online percentile of log1p(raw))
    percentile:
      window_size: 2048   # number of past scores kept per event_type
      warmup: 128         # events before percentile thresholding becomes active
    # Half-Space Trees parameters
    hst_n_trees: 25
    hst_height: 15
    hst_window_size: 250
    # LODA parameters
    loda_n_projections: 20
    loda_bins: 65536
    loda_range: 3.0
    loda_ema_alpha: 0.01
    loda_hist_decay: 1.0
    # KitNet parameters
    kitnet_max_size_ae: 10
    kitnet_grace_feature_mapping: 10000
    kitnet_grace_anomaly_detector: 50000
    kitnet_learning_rate: 0.1
    kitnet_hidden_ratio: 0.75
    # MemStream parameters
    mem_hidden_dim: 32
    mem_latent_dim: 8
    mem_memory_size: 128
    mem_lr: 0.001
    # ZScore baseline parameters
    zscore_min_count: 20
    zscore_std_floor: 0.001
    # Freq1D baseline parameters (hybrid categorical+numeric)
    freq1d_bins: 65536 # is high to ensure no collisions
    freq1d_alpha: 1.0
    freq1d_decay: 1.0
    freq1d_max_categories: 65536 # is high to ensure no collisions
    freq1d_aggregation: "topk_mean" # Freq1D aggregation: sum | mean | topk_mean | soft_topk_mean
    freq1d_topk: 8 # Used by topk_mean and soft_topk_mean
    freq1d_soft_topk_temperature: 0.25 # Used by soft_topk_mean (smaller => closer to max)
    # GaussCop parameters (Gaussian copula on freq1D marginals)
    gausscop_bins: 16384
    gausscop_alpha: 1.0
    gausscop_decay: 1.0
    gausscop_max_categories: 16384
    gausscop_reg: 0.01
    gausscop_u_clamp: 1e-12
    gausscop_max_features: 30  # max features for copula (0 = use all)
    gausscop_importance_window: 5000  # events before first selection; as we have ten thousands of events real quick thats a tiny number
    # CopulaTree parameters (streaming Gaussian pair-copula tree on freq1d marginals)
    copulatree_u_clamp: 1e-6
    copulatree_reg: 0.05
    copulatree_max_features: 30
    copulatree_importance_window: 500
    copulatree_tree_update_interval: 100
    copulatree_edge_score_aggregation: "mean" # sum | mean | topk_mean
    copulatree_edge_score_topk: 8
    # LatentCluster parameters (online latent clustering on freq1d-normalized inputs)
    latentcluster_max_clusters: 8
    latentcluster_u_clamp: 1e-6
    latentcluster_reg: 0.25
    latentcluster_update_alpha: 0.05
    latentcluster_spawn_threshold: 6.0
    # General parameters
    seed: 42
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  autoscaling:
    # Primary scaling knob for detector throughput/capacity.
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

ui:
  enabled: false
  image:
    repository: ghcr.io/shepherd-itsec/sentinel-ebpf-ui
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  logPath: /var/log/sentinel-ebpf/events.bin
  pollSeconds: 3  # Lower values increase UI/API polling load
  logLimit: 50
  # Defaults use chart fullname. Override if needed.
  detectorGrpcAddr: ""
  detectorEventsUrl: ""  # recent-events API for log tail in gRPC mode (default: http://...-detector:50052/recent_events)
  probeHealthUrl: ""
  probeMetricsUrl: ""
  detectorMetricsUrl: ""
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

config:
  logLevel: info
  metrics:
    enabled: true
    port: 9102
  health:
    port: 9101