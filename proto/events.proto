syntax = "proto3";

package sentinel.v1;

option cc_enable_arenas = true;
option java_multiple_files = true;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

// Envelope for any observed kernel-level event (syscalls and LSM-style events).
// Universal semantics: event_name = syscall/event name (openat, connect, ...);
// event_group = category/meta tag from rules (network, file, process, or empty).
// Syscalls behave like function calls; envelope carries one canonical data layout.
message EventEnvelope {
  // Unique ID for correlating responses.
  string event_id = 1;
  // Node and workload metadata.
  string hostname = 2;
  string pod_name = 3;
  string namespace = 4;
  string container_id = 5;
  // Syscall/event name (e.g. openat, connect, socket, execve). Same as data[0].
  string event_name = 8;
  // Category/meta tag from rules (e.g. network, file, process). Empty if no rule type.
  string event_group = 9;
  // Canonical ordered data vector. Same layout for all events; unused slots are empty.
  // Order: [event_name, event_id, comm, pid, tid, uid, arg0, arg1, path, flags]
  // - arg0, arg1: event-specific (e.g. fd, addrlen for connect; dfd, flags for openat).
  // - path: path-based events (open, execve, unlink, rename, chmod, chown, ...).
  // - flags: open/openat/openat2 flags; empty for others.
  repeated string data = 10;
  // Extra key-value enrichment (e.g. return_value, mount_namespace). Same keys for all types.
  map<string, string> attributes = 20;
  // Kernel timestamp (nanoseconds).
  uint64 ts_unix_nano = 30;
}

message DetectionResponse {
  string event_id = 1;
  bool anomaly = 2;
  string reason = 3;
  double score = 4;  // scaled (0-1)
  google.protobuf.Timestamp ts = 5;
  double score_raw = 6;  // unscaled (raw model output)
}

message AnomalyReport {
  string event_id = 1;
  string reason = 2;
  double score = 3;
  map<string, string> labels = 4;
}

service DetectorService {
  // Bidirectional stream of events and anomaly responses.
  rpc StreamEvents (stream EventEnvelope) returns (stream DetectionResponse);
  // Optional explicit anomaly report push.
  rpc ReportAnomaly (AnomalyReport) returns (google.protobuf.Empty);
}
