syntax = "proto3";

package sentinel.v1;

option cc_enable_arenas = true;
option java_multiple_files = true;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

// Envelope for any observed kernel-level event (syscalls and LSM-style events).
// event_name = syscall/event name (openat, connect, ...);
// event_group = category/meta tag from rules (network, file, process, or empty).
message EventEnvelope {
  // Correlation id (client-generated); not the Linux syscall number.
  string event_id = 1;
  string hostname = 2;
  string pod_name = 3;
  string namespace = 4;
  string container_id = 5;
  string event_name = 8;
  string event_group = 9;

  // Syscall payload (same fields for every event type; unused strings are empty).
  uint32 syscall_nr = 11; // Linux syscall number (e.g. 257 for openat).
  string comm = 12;
  string pid = 13;
  string tid = 14;
  string uid = 15;
  string arg0 = 16;
  string arg1 = 17;
  string path = 18; // path-based syscalls; empty otherwise.

  map<string, string> attributes = 20;
  uint64 ts_unix_nano = 30;
}

message DetectionResponse {
  string event_id = 1;
  bool anomaly = 2;
  string reason = 3;
  double score = 4;  // scaled (0-1)
  google.protobuf.Timestamp ts = 5;
  double score_raw = 6;  // unscaled (raw model output)
}

message AnomalyReport {
  string event_id = 1;
  string reason = 2;
  double score = 3;
  map<string, string> labels = 4;
}

service DetectorService {
  rpc StreamEvents (stream EventEnvelope) returns (stream DetectionResponse);
  rpc ReportAnomaly (AnomalyReport) returns (google.protobuf.Empty);
}
