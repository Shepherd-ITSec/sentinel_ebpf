[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = -v --tb=short -m "not gpu and not perf"
markers =
    integration: marks tests as integration tests (deselect with '-m "not integration"')
    slow: marks tests as slow (deselect with '-m "not slow"')
    gpu: marks tests that require a CUDA-visible torch environment
    perf: marks tests that measure end-to-end throughput or other machine-dependent performance
